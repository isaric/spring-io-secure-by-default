server {
    listen 3000;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ── Resource Server reverse proxy ─────────────────────────────────
    # Browser → nginx (HTTP) → resource-server (HTTP now / HTTPS+mTLS later)
    # To enable mTLS: change proxy_pass to https://resource-server:8443
    #                 add proxy_ssl_* directives below
    location /api/ {
        proxy_pass         http://resource-server:8080/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Uncomment when resource-server is on HTTPS with SPIFFE cert:
        # proxy_pass                  https://resource-server:8443/api/;
        # proxy_ssl_trusted_certificate /spire-certs/bundle.pem;
        # proxy_ssl_verify            on;
        # proxy_ssl_verify_depth      2;
        # proxy_ssl_session_reuse     on;
    }

    location /actuator/ {
        proxy_pass         http://resource-server:8080/actuator/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── SPIRE cert metadata ────────────────────────────────────────────
    # Written by spire-cert-watcher every ~60s, served as a static JSON file.
    location = /cert-info.json {
        alias /spire-certs/cert-info.json;
        add_header Content-Type application/json;
        add_header Cache-Control "no-cache, no-store";
        add_header X-Content-Type-Options nosniff;
    }

    # ── SPA routing ───────────────────────────────────────────────────
    location /callback {
        try_files $uri /index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static asset caching ──────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
