server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: auth-server
    static_configs:
      - targets:
          - localhost
        labels:
          job: auth-server
          service: auth-server
          __path__: /var/log/auth-server/*.log

  - job_name: resource-server
    static_configs:
      - targets:
          - localhost
        labels:
          job: resource-server
          service: resource-server
          __path__: /var/log/resource-server/*.log

  - job_name: docker-logs
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["com.spring.demo=true"]
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
      - source_labels: ['__meta_docker_container_label_com_spring_demo_service']
        target_label: service
