server:
  port: 8080
  # mTLS — uncomment to terminate TLS with SPIFFE-issued certs (Step 3 demo)
  # ssl:
  #   enabled: true
  #   bundle: spiffe
  #   client-auth: want

spring:
  application:
    name: resource-server
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://auth-server:9000/oauth2/jwks
          issuer-uri: http://auth-server:9000
  ssl:
    bundle:
      pem:
        spiffe:
          # Certs are written by spire-cert-watcher every ~60s.
          # Spring Boot reloads TLS automatically — no restart needed.
          reload-on-update: true
          keystore:
            certificate: /spire-certs/svid.pem
            private-key: /spire-certs/svid-key.pem
          truststore:
            certificate: /spire-certs/bundle.pem

opa:
  url: http://opa:8181
  # Set to false in production to deny requests when OPA is unreachable
  fail-open: true

logging:
  level:
    org.springframework.security: INFO
    io.spring.demo: DEBUG
    AUDIT: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true
  endpoint:
    health:
      show-details: always
